name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/ --ignore E501

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install non-Windows deps
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python-headless numpy loguru psutil pytest pytest-cov
      - name: Run unit tests (no hardware, no pywin32)
        env:
          PYTHONPATH: src
        run: |
          pytest tests/test_phase2.py -v --tb=short \
            --ignore=tests/test_core.py

  # Test completi solo su Windows (pywin32, pydirectinput disponibili)
  test-windows:
    name: Test Windows full
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Test (no BlueStacks hardware)
        env:
          PYTHONPATH: src
        run: pytest tests/ -v -m "not hardware" --tb=short
